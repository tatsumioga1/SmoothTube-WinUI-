<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>SmoothTube Player</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      border: 0;
      padding: 0;
      overflow: hidden;
      background: transparent !important;
    }

    /*
      WebView2 itself does not reliably inherit WinUI rounded clipping.
      Keep the page transparent and clip the actual YouTube iframe inside
      a rounded wrapper instead.
    */
    #playerShell {
      position: fixed;
      inset: 0;
      overflow: hidden;
      border-radius: 12px;
      background: transparent !important;
      clip-path: inset(0 round 12px);
      transform: translateZ(0);
    }

    #player,
    #playerShell > iframe {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      border: 0 !important;
      padding: 0 !important;
      display: block !important;
      background: transparent !important;
    }

    #player iframe,
    iframe {
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      border: 0 !important;
      padding: 0 !important;
      display: block !important;
      background: transparent !important;
    }

    body.smooth-fullscreen #playerShell {
      left: 0 !important;
      top: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border-radius: 0 !important;
      clip-path: none !important;
      background: #000 !important;
    }

    body.smooth-fullscreen #player,
    body.smooth-fullscreen #playerShell > iframe,
    body.smooth-fullscreen #player iframe,
    body.smooth-fullscreen iframe {
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border-radius: 0 !important;
      clip-path: none !important;
      background: #000 !important;
    }

    html.smooth-fullscreen,
    body.smooth-fullscreen {
      background: #000 !important;
    }

    body.idle,
    body.idle iframe,
    body.idle * {
      cursor: none;
    }
  </style>
</head>
<body>
  <div id="playerShell">
    <div id="player"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get("videoId") || "";
    const startSeconds = Math.max(0, Number(params.get("startSeconds") || 0));
    const isLivePlayback = params.get("live") === "1";

    /*
      SmoothTube codec compatibility filter.
      The app passes disabled codec tokens through blockCodecs. We report those
      codecs as unsupported before the YouTube iframe player initializes, so
      YouTube chooses one of the codecs the user allowed in Settings.
    */
    const blockedCodecTokens = new Set(
      (params.get("blockCodecs") || "av01,vp08,vp8")
        .split(",")
        .map(value => value.trim().toLowerCase())
        .filter(Boolean)
    );

    function shouldBlockCodec(type) {
      const normalized = String(type || "").toLowerCase();

      if (!normalized) {
        return false;
      }

      for (const codec of blockedCodecTokens) {
        if (normalized.includes(codec)) {
          return true;
        }
      }

      return false;
    }

    function installCodecCompatibilityFilter() {
      try {
        const mediaSource =
          window.MediaSource ||
          window.WebKitMediaSource;

        if (mediaSource &&
            typeof mediaSource.isTypeSupported === "function" &&
            !mediaSource.__smoothTubeCodecFilterInstalled) {
          const originalIsTypeSupported =
            mediaSource.isTypeSupported.bind(mediaSource);

          mediaSource.isTypeSupported = function(type) {
            if (shouldBlockCodec(type)) {
              return false;
            }

            return originalIsTypeSupported(type);
          };

          mediaSource.__smoothTubeCodecFilterInstalled = true;
        }

        if (window.HTMLMediaElement &&
            window.HTMLMediaElement.prototype &&
            typeof window.HTMLMediaElement.prototype.canPlayType === "function" &&
            !window.HTMLMediaElement.prototype.__smoothTubeCodecFilterInstalled) {
          const originalCanPlayType =
            window.HTMLMediaElement.prototype.canPlayType;

          window.HTMLMediaElement.prototype.canPlayType = function(type) {
            if (shouldBlockCodec(type)) {
              return "";
            }

            return originalCanPlayType.call(this, type);
          };

          window.HTMLMediaElement.prototype.__smoothTubeCodecFilterInstalled = true;
        }
      } catch (_) {
      }
    }

    installCodecCompatibilityFilter();

    let idleTimer = 0;
    let progressTimer = 0;
    let resumeApplied = false;
    let autoPlayAttempts = 0;
    let hasStartedPlaying = false;
    let userPaused = false;

    function resetCursorIdle() {
      document.body.classList.remove("idle");
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        document.body.classList.add("idle");
      }, 4000);
    }

    document.addEventListener("mousemove", resetCursorIdle);
    document.addEventListener("keydown", resetCursorIdle);
    resetCursorIdle();

    function syncSmoothTubeFullscreenClass() {
      const isFullScreen =
        !!document.fullscreenElement ||
        !!document.webkitFullscreenElement ||
        !!document.mozFullScreenElement ||
        !!document.msFullscreenElement;

      document.documentElement.classList.toggle("smooth-fullscreen", isFullScreen);
      document.body.classList.toggle("smooth-fullscreen", isFullScreen);
    }

    document.addEventListener("fullscreenchange", syncSmoothTubeFullscreenClass);
    document.addEventListener("webkitfullscreenchange", syncSmoothTubeFullscreenClass);
    document.addEventListener("mozfullscreenchange", syncSmoothTubeFullscreenClass);
    document.addEventListener("MSFullscreenChange", syncSmoothTubeFullscreenClass);


    function getPlayer() {
      return window.player || window.ytPlayer || window.youtubePlayer || null;
    }

    function postMessage(payload) {
      try {
        window.chrome?.webview?.postMessage(JSON.stringify(payload));
      } catch (_) {
      }
    }

    function getPlayerSeconds() {
      const player = getPlayer();

      if (!player || typeof player.getCurrentTime !== "function") {
        return { currentTime: 0, duration: 0 };
      }

      let currentTime = 0;
      let duration = 0;

      try {
        currentTime = Number(player.getCurrentTime() || 0);
      } catch (_) {
      }

      try {
        if (typeof player.getDuration === "function") {
          duration = Number(player.getDuration() || 0);
        }
      } catch (_) {
      }

      if (!Number.isFinite(currentTime)) {
        currentTime = 0;
      }

      if (!Number.isFinite(duration)) {
        duration = 0;
      }

      return { currentTime, duration };
    }

    function buildProgressPayload(type = "progress") {
      const { currentTime, duration } = getPlayerSeconds();

      return {
        type,
        videoId,
        currentTime,
        duration
      };
    }

    function reportProgress(type = "progress") {
      postMessage(buildProgressPayload(type));
    }

    window.__smoothTubeGetProgress = type => buildProgressPayload(type || "snapshot");

    function applyResume() {
      if (isLivePlayback || resumeApplied || startSeconds < 5) {
        return;
      }

      const player = getPlayer();

      if (!player || typeof player.seekTo !== "function") {
        return;
      }

      try {
        player.seekTo(startSeconds, true);
        resumeApplied = true;
        reportProgress("resumed");
      } catch (_) {
      }
    }



    function seekToLiveEdge() {
      // For livestreams, do not manually seek using getDuration().
      // YouTube's live/DVR duration can point to the start/end of the event and
      // manual seeking often causes buffering. Loading without startSeconds lets
      // YouTube choose the live edge.
      return false;
    }

    window.__smoothTubeSeekToLiveEdge = seekToLiveEdge;


    function tryStartPlayback() {
      const player = getPlayer();

      if (!player || typeof player.playVideo !== "function") {
        return;
      }

      try {
        // WebView2/Chromium can block live autoplay with sound more often than
        // normal VOD autoplay. Start muted if needed, then unmute once playback
        // has actually started.
        if (isLivePlayback && typeof player.mute === "function") {
          player.mute();
        }

        player.playVideo();
        reportProgress("autoplay");
      } catch (_) {
      }
    }

    function startPlaybackWithRetries() {
      clearTimeout(window.__smoothTubeAutoplayRetryTimer);
      autoPlayAttempts = 0;

      const retry = () => {
        const player = getPlayer();

        if (!player) {
          if (autoPlayAttempts++ < 20) {
            window.__smoothTubeAutoplayRetryTimer = setTimeout(retry, 300);
          }

          return;
        }

        let state = -999;

        try {
          if (typeof player.getPlayerState === "function") {
            state = player.getPlayerState();
          }
        } catch (_) {
        }

        if (userPaused || hasStartedPlaying) {
          return;
        }

        if (state !== YT.PlayerState.PLAYING) {
          applyResume();
          tryStartPlayback();

          const maxAttempts = isLivePlayback ? 60 : 12;
          const retryDelay = isLivePlayback ? 500 : 400;

          if (autoPlayAttempts++ < maxAttempts) {
            window.__smoothTubeAutoplayRetryTimer = setTimeout(retry, retryDelay);
          } else if (isLivePlayback) {
            postMessage({ type: "autoplay-blocked", videoId });
          }
        }
      };

      retry();
    }

    function startProgressReporting() {
      clearInterval(progressTimer);
      progressTimer = setInterval(() => {
        reportProgress("progress");
      }, 3000);
    }

    window.__smoothTubeForceAutoplay = () => {
      userPaused = false;

      const player = getPlayer();

      try {
        if (isLivePlayback && player && typeof player.mute === "function") {
          player.mute();
        }
      } catch (_) {
      }

      tryStartPlayback();
      startPlaybackWithRetries();
      return true;
    };

    window.__smoothTubeReportProgress = () => reportProgress("progress");
    window.__smoothTubeTogglePlayback = () => {
      const player = getPlayer();

      if (!player) {
        return false;
      }

      try {
        let state = -999;

        if (typeof player.getPlayerState === "function") {
          state = player.getPlayerState();
        }

        if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) {
          userPaused = true;
          clearTimeout(window.__smoothTubeAutoplayRetryTimer);

          if (typeof player.pauseVideo === "function") {
            player.pauseVideo();
          }

          reportProgress("paused");
          return true;
        }

        userPaused = false;

        if (typeof player.playVideo === "function") {
          player.playVideo();
        }

        reportProgress("playing");
        return true;
      } catch (_) {
        return false;
      }
    };

    window.__smoothTubeApplyResume = seconds => {
      const player = getPlayer();

      if (!player || typeof player.seekTo !== "function") {
        return false;
      }

      const value = Number(seconds || 0);

      if (!Number.isFinite(value) || value < 5) {
        return false;
      }

      try {
        player.seekTo(value, true);
        resumeApplied = true;
        reportProgress("resumed");
        return true;
      } catch (_) {
        return false;
      }
    };

    window.addEventListener("beforeunload", () => {
      reportProgress("progress");
    });

    function onYouTubeIframeAPIReady() {
      if (!videoId) {
        return;
      }

      window.player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId,
        playerVars: {
          autoplay: 1,
          playsinline: 1,
          enablejsapi: 1,
          rel: 0,
          modestbranding: 1,
          origin: window.location.origin,
          mute: isLivePlayback ? 1 : 0,
          start: !isLivePlayback && startSeconds >= 5 ? Math.floor(startSeconds) : undefined
        },
        events: {
          onReady: () => {
            window.ytPlayer = window.player;
            window.youtubePlayer = window.player;
            applyResume();
            reportProgress("ready");
            startProgressReporting();
            window.__smoothTubeForceAutoplay();

            if (isLivePlayback) {
              setTimeout(window.__smoothTubeForceAutoplay, 400);
              setTimeout(window.__smoothTubeForceAutoplay, 1200);
              setTimeout(window.__smoothTubeForceAutoplay, 2500);
            }
          },
          onStateChange: event => {
            if (event.data === YT.PlayerState.CUED && !hasStartedPlaying && !userPaused) {
              window.__smoothTubeForceAutoplay();
            }

            if (event.data === YT.PlayerState.PLAYING) {
              hasStartedPlaying = true;
              userPaused = false;
              clearTimeout(window.__smoothTubeAutoplayRetryTimer);
              applyResume();

              if (isLivePlayback && typeof getPlayer()?.unMute === "function") {
                setTimeout(() => {
                  try {
                    getPlayer()?.unMute();
                  } catch (_) {
                  }
                }, 900);
              }

              reportProgress("playing");
              startProgressReporting();
            }

            if (event.data === YT.PlayerState.PAUSED) {
              if (hasStartedPlaying) {
                userPaused = true;
                clearTimeout(window.__smoothTubeAutoplayRetryTimer);
              }

              reportProgress("paused");
            }

            if (event.data === YT.PlayerState.ENDED) {
              reportProgress("ended");

              if (!isLivePlayback) {
                postMessage({ type: "ended" });
                window.chrome?.webview?.postMessage("ended");
              }
            }
          }
        }
      });

      window.ytPlayer = window.player;
      window.youtubePlayer = window.player;
    }
  </script>
  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
